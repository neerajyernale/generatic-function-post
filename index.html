<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>posts</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container mt-3">
    <div class="row">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-header bg-info d-flex align-items-center text-white">
            <i class="fa-solid fa-user-plus ml-2"></i>
            <h4 class="ml-3 mb-0">Add and Update User</h4>
          </div>
          <div class="card-body">
            <form id="postForm">
              <!-- Title -->
              <div class="mb-3">
                <label for="title">Title*</label>
                <input
                  type="text"
                  placeholder="Enter The Title"
                  class="form-control"
                  id="title"
                />
              </div>
              <div class="mb-3">
                <label for="body">Body*</label>
                <textarea
                  placeholder="Enter The Body"
                  class="form-control"
                  id="body"
                  rows="3"
                ></textarea>
              </div>
              <div class="mb-3">
                <label class="" for="userId">User ID *</label>
                <select id="userId" class="form-control">
                  <option value="1">User 1</option>
                  <option value="2">User 2</option>
                  <option value="3">User 3</option>
                  <option value="4">User 4</option>
                  <option value="5">User 5</option>
                  <option value="6">User 6</option>
                  <option value="7">User 7</option>
                  <option value="8">User 8</option>
                  <option value="9">User 9</option>
                  <option value="10">User 10</option>
                </select>
              </div>
              <div class="card-footer d-flex justify-content-between">
            <button
              class="btn btn-warning mt-2 d-none btn-block"
              id="updateBtn"
            >
              <i class="fa-solid fa-pen"></i>
              <span>Update User</span>
            </button>

            <button
              type="button"
              class="btn btn-primary mt-2 btn-block"
              id="addBtn" 
            >
              <i class="fa-solid fa-user-plus"></i>
              <span>Add User</span>
            </button>
          </div>
            </form>
          </div>
          
        </div>
      </div>
    </div>

    <div class="row mt-4" id="postContainer"></div>
  </div>
   <div class="spinner d-none" id="spinner">
           <div class="spinner-border text-danger" role="status"></div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/app.js"></script>
</body>
</html>
